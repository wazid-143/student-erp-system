<!DOCTYPE html>
<html>

<head>

    <title>Create User</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Create User</h1>

        <form method="POST">

            <input type="text"
                   name="fullname"
                   placeholder="Full Name">

            <input type="email"
                   name="email"
                   placeholder="Email">

            <input type="password"
                   name="password"
                   placeholder="Password">

            <select name="role">

                <option value="teacher">

                    Teacher

                </option>

                <option value="admin">

                    Admin

                </option>

            </select>

            <button type="submit">

                Create User

            </button>

        </form>

    </div>

</body>

</html>
