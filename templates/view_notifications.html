<!DOCTYPE html>
<html>

<head>

    <title>Notifications</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container table-container">

        <h1>Notifications</h1>

        <table class="student-table">

            <tr>

                <th>ID</th>
                <th>Message</th>

            </tr>

            {% for item in notifications %}

            <tr>

                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>

            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
